<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear cuenta de alumno</title>
</head>

<body>
    <main>




        <form action="#" method="get">
            <label for="name">Nombre:</label>
            <input type="text" id="name" name="name" required placeholder="Ingrese su nombre completo">

            <label for="email">Correo electrónico:</label>
            <input type="email" id="email" name="email" required placeholder="Ingrese su email">

            <label for="password">Contraseña:</label>
            <input type="password" id="password" name="password" required placeholder="Ingrese su contraseña">

            <label for="edad">Edad:</label>
            <input type="number" id="edad" name="edad" required placeholder="Ingrese su edad">

            <label for="portfolio">Portfolio:</label>
            <input type="url" id="portfolio" name="portfolio" placeholder="Ingrese la URL de su portfolio">

            <label for="shortText">Acepter con</label>
            <textarea id="shortText" name="shortText" placeholder="Ingrese un texto corto"></textarea>
            
            <button type="submit">Enviar</button>
        </form>
    </main>




</body>

</html>
