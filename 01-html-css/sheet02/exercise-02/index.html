<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear cuenta de alumno</title>
</head>

<body>
    <main>

        <h1>Crear cuenta de alumno</h1>



        <form action="#" method="get">

            <div>
                <label for="username">Usuario:</label>
                <input type="text" id="username" name="username" required placeholder="Ingrese su nombre de usuario"
                    minlength="3" maxlength="50" title="El nombre de usuario debe tener entre 3 y 50 caracteres">
            </div>

            <div>
                <label for="email">Correo electrónico:</label>
                <input type="email" id="email" name="email" required placeholder="Ingrese su email" maxlength="100"
                    title="Ingrese un correo electrónico válido con un máximo de 100 caracteres">
            </div>

            <div>
                <label for="password">Contraseña:</label>
                <input type="password" id="password" name="password" required placeholder="Ingrese su contraseña"
                    minlength="8" maxlength="20" pattern="[a-zA-Z0-9]{8,}"
                    title="La contraseña debe tener entre 8 y 20 caracteres y solo puede contener letras y números">
            </div>

            <div>
                <label for="edad">Edad:</label>
                <input type="number" id="edad" name="edad" required placeholder="Ingrese su edad" min="14" max="120"
                    title="La edad debe estar entre 14 y 120 años">
            </div>

            <div>
                <label for="portfolio">Portfolio:</label>
                <input type="url" id="portfolio" name="portfolio" placeholder="Ingrese la URL de su portfolio"
                    title="Ingrese una URL válida para su portfolio">
            </div>

            <div>
                <input type="checkbox" id="accept" name="accept" required>
                <label for="accept">Acepto las condiciones de uso</label>
            </div>
            <button type="submit">Enviar</button>
        </form>
    </main>




</body>

</html>
