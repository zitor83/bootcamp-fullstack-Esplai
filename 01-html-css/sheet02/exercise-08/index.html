<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de progreso del alumno</title>
</head>
<body>
    <header>
        <h1>Panel de progreso del alumno</h1>
    </header>
   <main>
        <section>
            <h2>Progreso del curso</h2>
            <p>El alumno ha completado el 75% del curso.</p>
            <progress value="75" max="100"></progress>
        </section>
        <section>
            <h2>Progreso de las tareas</h2>
            <p>El alumno ha completado 3 de 5 tareas.</p>
            <progress value="3" max="5"></progress>
        </section>
        <section>   
            <h2>Nota media de los examenes</h2>
            <p>La nota media de los exámenes es 5.</p>
            <meter value="5" min="0" max="10" >5</meter>
        </section>
        <section>
            <h2>Asistencia a clase</h2>
            <p>El alumno ha asistido a 1 de 3 clases.</p>
            <meter value="1" min="0" max="3" >1</meter>
        </section>
   </main>  
</body>
</html>
