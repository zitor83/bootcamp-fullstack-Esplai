<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
</head>

<body>
    <header>
        <h1>Formulario</h1>
        <p>Por favor, completa el siguiente formulario:</p>
    </header>
    <main>
        <form>
            <fieldset>
                <legend>Información Personal</legend>
                <label for="name">Nombre</label>
                <input type="text" id="name" name="name" placeholder="Escribe tu nombre" required minlength="3"
                    maxlength="20">

                <label for="email">Correo</label>
                <input type="email" id="email" name="email" placeholder="Escribe tu correo" required>

                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Escribe tu contraseña" required
                    minlength="6" pattern="^(?=.*[A-Za-z])(?=.*\d)[A-Za-z\d]{6,}$"
                    title="La contraseña debe tener al menos 6 caracteres, incluyendo letras y números.">

                <label for="age">Edad</label>
                <input type="number" id="age" name="age" placeholder="Escribe tu edad" required min="18" step="1"
                    title="Debes ser ser mayor de edad para registrarte.">

                <label for="website">Web</label>
                <input type="url" id="website" name="website" placeholder="Escribe tu website">

                <label for="terms">Acepto condiciones</label>
                <input type="checkbox" id="terms" name="terms" required
                    title="Debes aceptar las condiciones para registrarte.">
            </fieldset>
            <button>Enviar</button>
        </form>
    </main>
</body>

</html>
