<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscripción a un taller técnico</title>
</head>

<body>
    <header>
        <h1>Inscripción a un taller técnico</h1>
    </header>
    <main>
        <p>Por favor, complete el siguiente formulario.</p>
        <form action="#" method="get">

            <div>
                <label for="name">Nombre:</label>
                <input type="text" id="name" name="name" required placeholder="Ingrese su nombre completo">
            </div>

            <div>
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required placeholder="Ingrese su email">
            </div>

            <div>
                <label for="telephone">Teléfono:</label>
                <input type="tel" id="telephone" name="telephone" required placeholder="Ingrese su teléfono">
            </div>

            <div>
                <label for="favouriteDate">Fecha preferida:</label>
                <input type="date" id="favouriteDate" name="favouriteDate">
            </div>

            <div>
                <label for="shortText">Mensaje breve:</label>
                <textarea id="shortText" name="shortText" placeholder="Ingrese un texto corto"></textarea>
            </div>

            <div>
                <button type="submit">Enviar</button>
            </div>

        </form>
    </main>
</body>

</html>
