<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap"
        rel="stylesheet">
    <title>Pokédex</title>
</head>

<body>

    <main>
        <section class="search-bar">
            <form action="#" method="get">
                <input type="search" id="search" name="search" placeholder="Filtra Pokemons por nombre..."
                    aria-label="Buscar Pokemon por nombre">
            </form>
        </section>

        <section id="tarjetas-automaticas-pokemons" class="pokemon-grid"> 

        </section>
        <section class="pagination">
            <button id="btn-anterior" aria-label="Anterior" disabled>Anterior</button>
            <span id="pagina-actual">Página 1</span>
            <button id="btn-siguiente" aria-label="Siguiente">Siguiente</button>

        </section>
    </main>

    <script type="module" src="js/main.js"></script>
</body>

</html>
